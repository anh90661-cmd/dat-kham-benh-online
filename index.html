<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Trị MEDICA - DatLichKham2029</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --teal-50: #f0fdfa; --teal-100: #ccfbf1; --teal-600: #0d9488; --teal-700: #0f766e; --teal-900: #134e4a;
            --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0; --slate-700: #334155; --slate-900: #0f172a;
            --emerald-500: #10b981; --rose-500: #f43f5e; --amber-500: #f59e0b; --sidebar-width: 280px;
            --radius-md: 12px; --radius-lg: 20px; --transition-smooth: all 0.35s ease;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05); --shadow-lg: 0 20px 40px -10px rgba(15, 118, 110, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--slate-100); color: var(--slate-900); display: flex; min-height: 100vh; overflow: hidden; }
        .sidebar { width: var(--sidebar-width); background: var(--slate-900); color: white; display: flex; flex-direction: column; padding: 30px 20px; flex-shrink: 0; }
        .sidebar-brand { display: flex; align-items: center; gap: 12px; font-size: 24px; font-weight: 800; color: white; margin-bottom: 40px; }
        .sidebar-brand i { color: var(--teal-100); background: var(--teal-600); padding: 10px; border-radius: var(--radius-md); }
        .menu-wrapper { flex-grow: 1; display: flex; flex-direction: column; gap: 25px; }
        .menu-group { display: flex; flex-direction: column; gap: 6px; }
        .menu-label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: #475569; letter-spacing: 1px; margin-left: 12px; }
        .menu-btn { width: 100%; padding: 14px 16px; background: transparent; border: none; color: #94a3b8; font-size: 14px; font-weight: 600; text-align: left; cursor: pointer; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: space-between; transition: var(--transition-smooth); }
        .menu-btn:hover, .menu-btn.active { background: var(--teal-600); color: white; }
        .menu-badge { background: var(--rose-500); color: white; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
        .sidebar-footer { border-top: 1px solid #1e293b; padding-top: 20px; display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid var(--teal-600); }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.top-bar { height: 80px; background: white; border-bottom: 1px solid var(--slate-200); display: flex; justify-content: space-between; align-items: center; padding: 0 40px; }
        .live-indicator { display: flex; align-items: center; gap: 8px; background: var(--teal-50); color: var(--teal-700); padding: 8px 16px; border-radius: var(--radius-lg); font-size: 13px; font-weight: 700; }
        .live-dot { width: 8px; height: 8px; background: var(--emerald-500); border-radius: 50%; }
        .workspace-body { flex-grow: 1; padding: 40px; overflow-y: auto; background-color: #f8fafc; }
        .app-section { display: none; opacity: 0; transform: translateY(15px); transition: var(--transition-smooth); }
        .app-section.active { display: block; opacity: 1; transform: translateY(0); }
        .card { background: white; border-radius: var(--radius-lg); padding: 30px; border: 1px solid var(--slate-200); box-shadow: var(--shadow-sm); margin-bottom: 30px; }
        .toast-box { position: fixed; top: 30px; right: -420px; background: white; border-radius: var(--radius-md); padding: 20px; box-shadow: var(--shadow-lg); border-left: 5px solid var(--teal-600); display: flex; align-items: center; gap: 15px; z-index: 9999; transition: right 0.4s ease; }
        .toast-box.active { right: 30px; }
        
        /* CSS LAYOUT GRID */
        .metrics-grid, .chart-layout-grid, .doctors-flex-grid, .form-interactive-grid { display: grid; gap: 25px; }
        .metrics-grid { grid-template-columns: repeat(4, 1fr); margin-bottom: 30px; }
        .metric-card { background: white; border: 1px solid var(--slate-200); border-radius: var(--radius-lg); padding: 24px; display: flex; align-items: center; justify-content: space-between; }
        .metric-icon-box { width: 56px; height: 56px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .m-teal { background: #ccfbf1; color: #0f766e; } .m-indigo { background: #e0e7ff; color: #4f46e5; } .m-amber { background: #fef3c7; color: #d97706; } .m-rose { background: #ffe4e6; color: #e11d48; }
        .chart-layout-grid { grid-template-columns: 1.6fr 1fr; }
        .bar-chart-container { margin-top: 25px; display: flex; flex-direction: column; gap: 16px; }
        .chart-row { display: flex; align-items: center; gap: 15px; }
        .chart-label { width: 100px; font-size: 13px; font-weight: 600; }
        .chart-track { flex-grow: 1; height: 12px; background: var(--slate-100); border-radius: 10px; overflow: hidden; }
        .chart-bar { height: 100%; background: var(--teal-600); border-radius: 10px; width: 0%; transition: width 1s ease; }
        .chart-value { width: 50px; text-align: right; font-size: 13px; font-weight: 700; }
        .doctors-flex-grid { grid-template-columns: repeat(3, 1fr); margin-bottom: 40px; }
.doctor-profile-card { background: white; border: 1px solid var(--slate-200); border-radius: var(--radius-lg); padding: 24px; cursor: pointer; transition: var(--transition-smooth); }
        .doctor-profile-card:hover { transform: translateY(-5px); border-color: var(--teal-600); }
        .doc-card-body { display: flex; gap: 20px; align-items: center; margin-bottom: 15px; }
        .doc-card-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
        .form-interactive-grid { grid-template-columns: repeat(3, 1fr); }
        .span-3 { grid-column: span 3; }
        .input-container { display: flex; flex-direction: column; gap: 8px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 16px; color: #94a3b8; }
        .input-wrapper input, .input-wrapper select, .input-wrapper textarea { width: 100%; padding: 14px 16px 14px 48px; border: 1px solid var(--slate-200); border-radius: 12px; background: var(--slate-50); outline: none; }
        .btn-submit-pro { width: 100%; padding: 16px; background: var(--teal-600); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .data-table-frame { width: 100%; overflow-x: auto; border-radius: 12px; border: 1px solid var(--slate-200); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 18px 20px; text-align: left; }
        th { background: var(--slate-50); font-weight: 700; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid var(--slate-200); }
        td { border-bottom: 1px solid var(--slate-200); }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .sp-pending { background: #fef3c7; color: #b45309; } .sp-success { background: #d1fae5; color: #065f46; }
        .btn-table-action { padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; background: var(--teal-50); color: var(--teal-700); }
    </style>
</head>
<body>

    <div id="globalToast" class="toast-box">
        <div><strong style="display:block; font-size:14px;" id="toastTitle">Hệ thống</strong><span style="font-size:13px; color:#64748b;" id="toastMsg">Thao tác thành công!</span></div>
    </div>

    <div class="sidebar">
        <div class="sidebar-brand"><i class="fa-solid fa-hospital-user"></i> MEDICA CORE</div>
        <div class="menu-wrapper">
            <div class="menu-group">
                <div class="menu-label">Phân Tích Trung Tâm</div>
                <button class="menu-btn active" onclick="navigateSPA('panel-dashboard', 'Bảng Thống Kê Giám Sát', this)">Tổng Quan Hệ Thống</button>
            </div>
            <div class="menu-group">
                <div class="menu-label">Cổng Bệnh Nhân</div>
<button class="menu-btn" onclick="navigateSPA('panel-booking', 'Đặt Lịch Hẹn Khám Trực Tuyến', this)">Đăng Ký Đặt Lịch</button>
                <button class="menu-btn" onclick="navigateSPA('panel-history', 'Lịch Sử Đăng Ký Khám Bệnh', this)">Sổ Tay Lịch Hẹn (<span id="badgeUserCount">0</span>)</button>
            </div>
            <div class="menu-group">
                <div class="menu-label">Cổng Nhân Viên</div>
                <button class="menu-btn" onclick="navigateSPA('panel-admin', 'Phê Duyệt Hồ Sơ Đặt Lịch', this)">Quản Lý Duyệt Ca (<span id="badgePendingCount">0</span>)</button>
            </div>
        </div>
        <div class="sidebar-footer">
            <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=crop&w=150&q=80" class="user-avatar">
            <div class="user-meta"><h4>Tiến Anh</h4><p>Nhóm Trưởng / Admin</p></div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="top-bar-left"><h2 id="txtCurrentViewTitle">Bảng Thống Kê Giám Sát</h2></div>
            <div class="top-bar-right"><div class="live-indicator"><div class="live-dot"></div> Hệ Thống Trực Tuyến</div></div>
        </div>

        <div class="workspace-body">
            <div id="DYNAMIC_CONTENT_PLACEHOLDER"></div>
        </div>
    </div>

    <script>
        let localDatabaseStore = [
            { id: "MĐ-4821", name: "Trần Anh Tuấn", phone: "0987112233", birth: "1995", department: "Khoa Tim Mạch", doctor: "GS.TS Nguyễn Văn A", date: "2026-06-20", time: "08:00 - 09:00", reason: "Đau thắt ngực về đêm", cost: 500000, status: "Chờ duyệt" }
        ];

        window.addEventListener("DOMContentLoaded", () => { refreshCoreAnalytics(); renderApplicationTables(); });

        function navigateSPA(targetSectionId, viewTitle, buttonRef) {
            document.querySelectorAll(".app-section").forEach(sec => sec.classList.remove("active"));
            document.querySelectorAll(".menu-btn").forEach(btn => btn.classList.remove("active"));
            const target = document.getElementById(targetSectionId);
            if(target) target.classList.add("active");
            buttonRef.classList.add("active");
            document.getElementById("txtCurrentViewTitle").innerText = viewTitle;
            renderApplicationTables(); refreshCoreAnalytics();
        }

        function triggerNotification(title, message) {
            const toast = document.getElementById("globalToast");
            document.getElementById("toastTitle").innerText = title;
            document.getElementById("toastMsg").innerText = message;
            toast.classList.add("active");
            setTimeout(() => { toast.classList.remove("active"); }, 3000);
        }
    </script>
</body>
</html>
