<div id="panel-booking" class="app-section">
    <div style="font-size: 14px; font-weight:800; color:#64748b; margin-bottom:15px;">BÁC SĨ ĐANG TRỰC TUYẾN</div>
    <div class="doctors-flex-grid">
        <div class="doctor-profile-card" onclick="autoSelectDoctor('GS.TS Nguyễn Văn A', 'Khoa Tim Mạch')">
            <div class="doc-card-body">
                <img src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?auto=format&fit=crop&w=150&q=80" class="doc-card-img">
                <div><h3>GS.TS Nguyễn Văn A</h3><span class="status-pill sp-success">Khoa Tim Mạch</span></div>
            </div>
            <p style="font-size:13px; color:#64748b;">Chuyên gia cố vấn tim mạch cao cấp tiêu chuẩn Quốc Tế.</p>
        </div>
        <div class="doctor-profile-card" onclick="autoSelectDoctor('Thạc sĩ Trần Thị B', 'Khoa Nhi Khoa')">
            <div class="doc-card-body">
                <img src="https://images.unsplash.com/photo-1594824813573-246434e33963?auto=format&fit=crop&w=150&q=80" class="doc-card-img">
                <div><h3>Thạc sĩ Trần Thị B</h3><span class="status-pill sp-success">Khoa Nhi Khoa</span></div>
            </div>
            <p style="font-size:13px; color:#64748b;">Hơn 12 năm kinh nghiệm xử lý chuyên khoa nhi tổng quát.</p>
        </div>
    </div>

    <div class="card">
        <form id="formProRegistration">
            <div class="form-interactive-grid">
                <div class="input-container"><label>Họ tên bệnh nhân</label><div class="input-wrapper"><i class="fa-solid fa-user"></i><input type="text" id="iptName" required></div></div>
                <div class="input-container"><label>Số điện thoại</label><div class="input-wrapper"><i class="fa-solid fa-phone"></i><input type="tel" id="iptPhone" required></div></div>
                <div class="input-container"><label>Năm sinh</label><div class="input-wrapper"><i class="fa-solid fa-calendar"></i><input type="number" id="iptBirth" required></div></div>
                <div class="input-container"><label>Chuyên khoa</label><div class="input-wrapper"><select id="iptDept" required><option value="Khoa Tim Mạch">Khoa Tim Mạch</option><option value="Khoa Nhi Khoa">Khoa Nhi Khoa</option></select></div></div>
                <div class="input-container"><label>Bác sĩ</label><div class="input-wrapper"><select id="iptDoctor" required><option value="GS.TS Nguyễn Văn A">GS.TS Nguyễn Văn A</option><option value="Thạc sĩ Trần Thị B">Thạc sĩ Trần Thị B</option></select></div></div>
                <div class="input-container"><label>Ngày giờ</label><input type="date" id="iptDate" required><select id="iptTime"><option value="08:00 - 09:00">08:00 AM</option></select></div>
                <div class="input-container span-3"><label>Lý do khám</label><div class="input-wrapper"><textarea id="iptReason" rows="2" required></textarea></div></div>
            </div>
            <button type="submit" class="btn-submit-pro">Xác Nhận Tạo Hồ Sơ</button>
        </form>
    </div>
</div>

<div id="panel-history" class="app-section">
    <div class="card">
        <div class="data-table-frame">
            <table>
                <thead><tr><th>Mã Đơn</th><th>Bác Sĩ</th><th>Khoa</th><th>Ngày Khám</th><th>Giờ Khám</th><th>Trạng Thái</th></tr></thead>
                <tbody id="domHistoryTableBody"></tbody>
            </table>
        </div>
    </div>
</div>
<script src="khuongduy15.js"></script>
