<div id="panel-dashboard" class="app-section active">
    <div class="metrics-grid">
        <div class="metric-card"><div><h3>Tổng Lịch</h3><h2 id="statTotal">0</h2></div><div class="metric-icon-box m-indigo"><i class="fa-solid fa-layer-group"></i></div></div>
        <div class="metric-card"><div><h3>Chờ Duyệt</h3><h2 id="statPending">0</h2></div><div class="metric-icon-box m-amber"><i class="fa-solid fa-hourglass"></i></div></div>
        <div class="metric-card"><div><h3>Đã Duyệt</h3><h2 id="statApproved">0</h2></div><div class="metric-icon-box m-teal"><i class="fa-solid fa-circle-check"></i></div></div>
        <div class="metric-card"><div><h3>Doanh Thu</h3><h2 id="statRevenue">0đ</h2></div><div class="metric-icon-box m-rose"><i class="fa-solid fa-wallet"></i></div></div>

        <div class="card">
            <h3>Mật Độ Theo Chuyên Khoa</h3>

                <div class="chart-row"><div class="chart-label">Khoa Tim Mạch</div><div class="chart-track"><div id="barTimMach" class="chart-bar"></div></div><div class="chart-value" id="valTimMach">0%</div></div>

            </div>
        </div>
    </div>
</div>
